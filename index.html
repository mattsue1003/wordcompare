<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語文大腦體操 - 日常相反詞連連看產生器</title>
    
    <!-- 引入 PDF 轉換套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary-color: #4f46e5; /* Indigo 600 */
            --primary-hover: #4338ca; /* Indigo 700 */
            --dark-color: #312e81;
            --bg-color: #eef2ff;
            --accent-color: #6366f1;
            --line-color: #e11d48; /* 解答線條顏色 (Rose 600) */
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            padding: 0;
            color: #334155;
        }
        
        .top-banner { background: var(--primary-color); height: 5px; width: 100%; }

        /* --- 控制面板 --- */
        .controls {
            background: white; 
            padding: 20px; 
            border-radius: 0 0 16px 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 950px; 
            margin: 0 auto 20px auto; 
        }
        
        .controls h2 { margin: 0 0 12px 0; color: var(--dark-color); font-size: 1.5rem; display: flex; align-items: center; gap: 8px;}

        .designer-info {
            background: #e0e7ff; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem;
            color: #3730a3; margin-bottom: 20px; border-left: 4px solid var(--primary-color);
            line-height: 1.6;
        }

        .control-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 6px; color: #475569; font-size: 0.9rem; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2); }

        .btn-group { grid-column: 1 / -1; display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
        button { flex: 1; min-width: 140px; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: all 0.2s; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .gen-btn { background: var(--primary-color); }
        .print-btn { background: #475569; }
        .pdf-btn { background: #ea580c; }

        /* 訊息提示框 */
        #msgBox {
            display: none; padding: 12px; border-radius: 8px; margin-bottom: 15px;
            text-align: center; font-weight: bold; font-size: 15px;
        }

        /* --- 響應式 A4 預覽區 --- */
        .preview-area { width: 100%; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
        .sheet-scaler { transform-origin: top center; margin-bottom: 20px; }

        .sheet {
            background: white; 
            width: 210mm; 
            height: 297mm; 
            padding: 15mm 20mm; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }

        .sheet-header { border-bottom: 3px double var(--primary-color); padding-bottom: 8px; margin-bottom: 15px; }
        .sheet-title { text-align: center; font-size: 24pt; font-weight: 900; color: #0f172a; margin-bottom: 12px; letter-spacing: 2px; }
        .sheet-info { display: flex; justify-content: space-between; font-size: 13pt; font-weight: bold; color: #334155; }

        .instruction {
            background: #f8fafc; border: 1px solid #cbd5e1; padding: 10px 15px; border-radius: 8px;
            color: #334155; font-size: 13pt; font-weight: bold; margin-bottom: 20px; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* --- 連連看主要區塊 --- */
        .worksheet-body {
            position: relative;
            display: flex;
            justify-content: space-between;
            flex-grow: 1; /* 佔滿剩餘高度 */
            padding: 10px 20px;
        }

        /* SVG 用來畫解答的線條 (修改：置於最頂層) */
        .answer-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* 不阻擋滑鼠事件 */
            z-index: 10; /* 修改為最高層級，確保線條壓過其他元素 */
        }

        .match-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 自動平均分配行距 */
            width: 38%;
            z-index: 2; /* 保持較低層級 */
        }

        .match-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border: 2px solid #94a3b8;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 18pt;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            height: 50px; /* 固定高度讓排版更整齊 */
        }

        /* 左欄：字在左，點在右 */
        .match-col.left .match-item { flex-direction: row; }
        /* 右欄：點在左，字在右 */
        .match-col.right .match-item { flex-direction: row-reverse; }

        .dot-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }

        .dot {
            width: 14px;
            height: 14px;
            background: #6366f1;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 3px #e0e7ff;
            position: relative;
        }

        .sheet-footer { 
            display: flex; justify-content: space-between; font-size: 10pt; color: #64748b; 
            margin-top: 20px; padding-top: 10px; border-top: 1px solid #e2e8f0;
        }

        #hidden-capture { position: fixed; left: -5000px; width: 210mm; }

        @media print {
            .no-print { display: none; }
            body { background: white; margin: 0; padding: 0;}
            .sheet-scaler { transform: none !important; height: auto !important; margin: 0; }
            .sheet { box-shadow: none; page-break-after: always; padding: 10mm 15mm; }
        }
    </style>
</head>
<body>

        <b>防重複機制：</b>若一次產生多頁測驗卷，系統會優先將 100 題輪流出完，確保在同一批考卷中「完全不會有重複的題目」！

        <div class="control-group">

                <option value="no">僅產生測驗題目</option>

        </div>
    </div>

    <div class="btn-group">
        <button class="gen-btn" onclick="generateSheets()">✨ 產生測驗卷</button>
        <button class="print-btn" onclick="window.print()">🖨️ 直接列印</button>

</div>

<div class="preview-area" id="output"></div>
<div id="hidden-capture"></div>

<script>

        { id: 51, left: "哭", right: "笑" }, { id: 52, left: "喜", right: "悲" },
        { id: 53, left: "愛", right: "恨" }, { id: 54, left: "喜歡", right: "討厭" },

        // 動作/抽象/數量 (25組)
        { id: 76, left: "買", right: "賣" }, { id: 77, left: "開", right: "關" },
        { id: 78, left: "推", right: "拉" }, { id: 79, left: "升", right: "降" },

        { id: 88, left: "有", right: "無" }, { id: 89, left: "生", right: "死" },
        { id: 90, left: "同", right: "異" }, { id: 91, left: "公", right: "私" },
        { id: 92, left: "貧", right: "富" }, { id: 93, left: "難", right: "易" },
        { id: 94, left: "繁", right: "簡" }, { id: 95, left: "多", right: "少" },
        { id: 96, left: "容易", right: "困難" }, { id: 97, left: "複雜", right: "簡單" },
        { id: 98, left: "結束", right: "開始" }, { id: 99, left: "接受", right: "拒絕" },
        { id: 100, left: "發現", right: "隱藏" }
    ];

    // 顯示提示訊息
    function showMessage(text, type = 'error') {
        const msgBox = document.getElementById('msgBox');
        msgBox.innerText = text;
        msgBox.style.display = 'block';
        msgBox.style.backgroundColor = type === 'error' ? '#fee2e2' : '#e0e7ff';
        msgBox.style.color = type === 'error' ? '#b91c1c' : '#3730a3';
        setTimeout(() => msgBox.style.display = 'none', 3000);
    }

    // 陣列洗牌函數 (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    // 主要的產生頁面流程
    function generateSheets() {
        const title = document.getElementById('titleInput').value || "語文大挑戰：相反詞連連看";
        const itemCount = parseInt(document.getElementById('itemCount').value);
        const pages = Math.max(1, parseInt(document.getElementById('pageCount').value) || 1);
        const showAns = document.getElementById('showAns').value;
        const output = document.getElementById('output');
        
        output.innerHTML = '<div style="padding: 20px; font-weight: bold; color: var(--primary-color); font-size: 18px;">正在為您排版題目，請稍候...</div>';

        setTimeout(() => {
            output.innerHTML = '';
            let allPagesData = [];
            
            // 為了「不重複出題」，先將 100 題洗牌
            let currentDictionary = shuffleArray(antonymDictionary);
            let dictIndex = 0;

            for (let p = 1; p <= pages; p++) {
                // 1. 依序從洗牌後的題庫中取出需要的數量
                let selectedPairs = [];
                for(let i = 0; i < itemCount; i++) {
                    // 如果 100 題都出完了，就重新洗牌再繼續
                    if(dictIndex >= currentDictionary.length) {
                        currentDictionary = shuffleArray(antonymDictionary);
                        dictIndex = 0;
                    }
                    selectedPairs.push(currentDictionary[dictIndex]);
                    dictIndex++;
                }
                
                // 2. 將左右詞彙分開
                let leftColData = selectedPairs.map(p => ({ id: p.id, text: p.left }));
                let rightColData = selectedPairs.map(p => ({ id: p.id, text: p.right }));
                
                // 3. 獨立打亂左右兩邊的順序
                leftColData = shuffleArray(leftColData);
                rightColData = shuffleArray(rightColData);

                // 防止正好平行相對（若有同行同ID，則再洗牌一次右邊）
                let retry = 0;
                while(retry < 5 && leftColData.some((l, idx) => l.id === rightColData[idx].id)) {
                    rightColData = shuffleArray(rightColData);
                    retry++;
                }

                allPagesData.push({ leftColData, rightColData, pageNum: p });
                
                // 產生測驗卷
                if (showAns === 'yes_after') {
                    output.appendChild(renderPage(title, leftColData, rightColData, p, false));
                    output.appendChild(renderPage(title + " (解答)", leftColData, rightColData, p, true));
                } else {
                    output.appendChild(renderPage(title, leftColData, rightColData, p, false));
                }
            }

            // 若需要統一在最後面產生解答卷
            if (showAns === 'yes_end') {
                allPagesData.forEach(data => {
                    output.appendChild(renderPage(title + " (解答)", data.leftColData, data.rightColData, data.pageNum, true));
                });
            }
            
            updateScale();
            
            // 由於需要抓取 DOM 元素座標來畫線，必須在 HTML 渲染到畫面後再執行畫線函數
            setTimeout(() => {
                drawAllAnswerLines();
                showMessage(`✨ 成功產生 ${pages} 頁測驗卷！題目已自動防重複。`, "success");
            }, 100);

        }, 50);
    }

    // 渲染單頁 DOM
    function renderPage(title, leftCol, rightCol, pageNum, isAns) {
        const scaler = document.createElement('div');
        scaler.className = 'sheet-scaler';
        const sheet = document.createElement('div');
        sheet.className = 'sheet';

        const renderItem = (item, side) => `
            <div class="match-item" data-id="${item.id}">
                <span>${item.text}</span>
                <div class="dot-container">
                    <div class="dot" id="dot-${side}-${pageNum}-${isAns ? 'ans' : 'q'}-${item.id}"></div>
                </div>
            </div>
        `;

        sheet.innerHTML = `
            <div class="sheet-header">
                <div class="sheet-title">${title}</div>
                <div class="sheet-info">
                    <span>姓名：__________</span>
                    <span>日期：___月___日</span>
                    <span>得分：____ / 100</span>
                </div>
            </div>
            <div class="instruction">✏️ 任務：請將左邊與右邊意思「相反」的詞語，用線連起來。</div>
            
            <div class="worksheet-body" id="body-${pageNum}-${isAns ? 'ans' : 'q'}">
                <svg class="answer-lines" id="svg-${pageNum}-${isAns ? 'ans' : 'q'}"></svg>
                <div class="match-col left">
                    ${leftCol.map(item => renderItem(item, 'left')).join('')}
                </div>
                <div class="match-col right">
                    ${rightCol.map(item => renderItem(item, 'right')).join('')}
                </div>
            </div>

            <div class="sheet-footer">
                <span>${isAns ? '解答卷' : '測驗卷'} - 第 ${pageNum} 頁</span>
                <span><a href="https://www.facebook.com/profile.php?id=100063748491881" target="_blank" style="color: #64748b; text-decoration: none;">設計者：鍾孟修 職能治療師</a></span>
            </div>
        `;
        scaler.appendChild(sheet);
        return scaler;
    }

    // 計算元素相對於某個父容器的 X, Y 中心座標
    function getRelativeCenterPos(elem, parent) {
        let x = 0, y = 0;
        let w = elem.offsetWidth;
        let h = elem.offsetHeight;
        let currentElem = elem;

        while (currentElem && currentElem !== parent) {
            x += currentElem.offsetLeft;
            y += currentElem.offsetTop;
            currentElem = currentElem.offsetParent;
        }
        return { x: x + w / 2, y: y + h / 2 };
    }

    // 畫出解答的連線
    function drawAllAnswerLines() {
        const ansBodies = document.querySelectorAll('.worksheet-body[id*="-ans"]');
        
        // 定義一組易於辨識的多種顏色
        const lineColors = [
            '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', 
            '#06b6d4', '#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', 
            '#f43f5e', '#14b8a6'
        ];
        
        ansBodies.forEach(body => {
            const svg = body.querySelector('svg.answer-lines');
            svg.innerHTML = ''; 
            
            const leftItems = body.querySelectorAll('.match-col.left .match-item');
            
            leftItems.forEach((leftItem, index) => {
                const id = leftItem.getAttribute('data-id');
                const rightItem = body.querySelector(`.match-col.right .match-item[data-id="${id}"]`);
                
                if(rightItem) {
                    const leftDot = leftItem.querySelector('.dot');
                    const rightDot = rightItem.querySelector('.dot');
                    
                    const pos1 = getRelativeCenterPos(leftDot, body);
                    const pos2 = getRelativeCenterPos(rightDot, body);
                    
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', pos1.x);
                    line.setAttribute('y1', pos1.y);
                    line.setAttribute('x2', pos2.x);
                    line.setAttribute('y2', pos2.y);
                    line.setAttribute('stroke', lineColors[index % lineColors.length]);
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-linecap', 'round');
                    line.setAttribute('opacity', '0.9'); // 設定 0.9 讓線條清晰且不會完全死硬遮蔽
                    
                    svg.appendChild(line);
                }
            });
        });
    }

    // 處理視窗縮放，確保 A4 頁面可以在螢幕上完整預覽
    function updateScale() {
        const previewArea = document.querySelector('.preview-area');
        if (!previewArea) return;
        
        const containerWidth = previewArea.clientWidth - 40;
        const scalers = document.querySelectorAll('.sheet-scaler');
        if (scalers.length === 0) return;
        
        const sheetWidth = 210 * 3.7795; // A4 mm 轉 px
        let scale = containerWidth / sheetWidth;
        if (scale > 1) scale = 1; 
        
        scalers.forEach(s => {
            s.style.transform = `scale(${scale})`;
            s.style.height = (297 * 3.7795 * scale) + "px";
        });
    }

    // 將頁面轉換為 PDF 檔案並下載
    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const btn = document.getElementById('pdfBtn');
        const sheets = document.querySelectorAll('.sheet');
        const hidden = document.getElementById('hidden-capture');
        
        if (sheets.length === 0) {
            showMessage("請先點擊「產生測驗卷」再下載 PDF", "error");
            return;
        }
        
        btn.disabled = true;
        btn.innerText = "⏳ 準備轉換 PDF...";

        try {
            const pdf = new jsPDF('p', 'mm', 'a4');
            for (let i = 0; i < sheets.length; i++) {
                btn.innerText = `⏳ 正在轉換第 ${i+1}/${sheets.length} 頁...`;
                
                const clone = sheets[i].cloneNode(true);
                clone.style.transform = "none";
                hidden.appendChild(clone);
                
                const cloneBody = clone.querySelector('.worksheet-body[id*="-ans"]');
                if(cloneBody) {
                    const cloneSvg = cloneBody.querySelector('svg.answer-lines');
                    cloneSvg.innerHTML = '';
                    const leftItems = cloneBody.querySelectorAll('.match-col.left .match-item');
                    
                    // PDF 產生時也同樣套用彩色線條
                    const lineColors = [
                        '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', 
                        '#06b6d4', '#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', 
                        '#f43f5e', '#14b8a6'
                    ];

                    leftItems.forEach((leftItem, index) => {
                        const id = leftItem.getAttribute('data-id');
                        const rightItem = cloneBody.querySelector(`.match-col.right .match-item[data-id="${id}"]`);
                        if(rightItem) {
                            const lDot = leftItem.querySelector('.dot');
                            const rDot = rightItem.querySelector('.dot');
                            const p1 = getRelativeCenterPos(lDot, cloneBody);
                            const p2 = getRelativeCenterPos(rDot, cloneBody);
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
                            line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
                            line.setAttribute('stroke', lineColors[index % lineColors.length]);
                            line.setAttribute('stroke-width', '4');
                            line.setAttribute('stroke-linecap', 'round');
                            line.setAttribute('opacity', '0.9'); // PDF 轉換時也同樣設定高清晰度
                            cloneSvg.appendChild(line);
                        }
                    });
                }

                const canvas = await html2canvas(clone, { scale: 1.5 }); 
                hidden.removeChild(clone);
                
                const imgData = canvas.toDataURL('image/jpeg', 0.85);
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
            }
            pdf.save('語文大腦體操_相反詞連連看.pdf');
            showMessage("✅ PDF 下載完成！", "success");
        } catch (e) {
            console.error(e);
            showMessage("轉換 PDF 時發生錯誤。如果頁數過多，建議分次產生，或直接使用「直接列印」。", "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "📱 下載 PDF";
        }
    }

    window.addEventListener('resize', updateScale);
    window.onload = generateSheets;
</script>

</body>
</html>
